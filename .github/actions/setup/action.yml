name: 'Project Setup'
description: 'Install Node.js 22, UV, and all dependencies. Caller must run actions/checkout@v4 first.'

inputs:
  node-version:
    description: 'Node.js version'
    default: '22'
  build:
    description: 'Run npm build after install'
    default: 'true'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
    - uses: astral-sh/setup-uv@v4
    - run: npm ci
      shell: bash
    - run: uv sync
      shell: bash
    - run: npm run build
      shell: bash
      if: inputs.build == 'true'
